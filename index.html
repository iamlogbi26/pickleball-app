<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mickleball Rotation</title>

<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<h1>🥒 Pickleball Court Manager</h1>

<div class="box">
  <input id="name" placeholder="Enter player name"/>
  <button onclick="addPlayer()">Add</button>
</div>

<div class="grid">

  <div class="card">
    <h2>Queue</h2>
    <ul id="queue"></ul>
  </div>

  <div class="card">
    <h2>Active Match</h2>
    <div id="match">None</div>
    <button onclick="startMatch()">Start Match</button>
    <button onclick="endMatch()">End Match</button>
  </div>

  <div class="card">
    <h2>Leaderboard</h2>
    <ul id="board"></ul>
  </div>

</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
